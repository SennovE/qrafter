version: '2'

run:
  timeout: 5m
  tests: true
  concurrency: 8

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - misspell
    - goconst
    - prealloc
    - gosec
    - bodyclose
    - sqlclosecheck
    - gocyclo
    - gocognit

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocognit
          - gocyclo
          - errcheck
          - goconst
          - unused

      - path: internal/.*
        linters:
          - revive

      - path: example_test.go
        linters:
          - gocritic

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentFormatting

    gocyclo:
      min-complexity: 15

    gocognit:
      min-complexity: 20

    goconst:
      min-len: 2
      min-occurrences: 2

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

formatters:
  enable:
    - gofumpt
    - goimports
